<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" role="img">
  <title>SDF의 zero-level set으로 표현되는 표면</title>
  <desc>SDF 값이 음수(내부), 0(표면), 양수(외부)로 나뉘는 개념도</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .t { font-size: 14px; fill: #2c2c2a; font-weight: 400; }
      .ts { font-size: 12px; fill: #5f5e5a; font-weight: 400; }
      .th { font-size: 14px; fill: #2c2c2a; font-weight: 500; }
    </style>
  </defs>

  <!-- 외부 영역 (f > 0) -->
  <rect x="60" y="50" width="560" height="280" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" opacity="0.4"/>
  <text class="ts" x="90" y="80" fill="#0C447C">f(x) &gt; 0 (외부)</text>

  <!-- 객체 (f &lt; 0) -->
  <ellipse cx="340" cy="190" rx="140" ry="90" fill="#FAECE7" stroke="#D85A30" stroke-width="2.5" opacity="0.9"/>

  <text class="th" x="340" y="185" text-anchor="middle" dominant-baseline="central" fill="#993C1D">f(x) &lt; 0</text>
  <text class="ts" x="340" y="205" text-anchor="middle" dominant-baseline="central" fill="#993C1D">(내부)</text>

  <!-- zero level set 라벨 -->
  <line x1="420" y1="127" x2="530" y2="95" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="420" cy="127" r="2.5" fill="#D85A30"/>
  <text class="th" x="540" y="92" fill="#993C1D">표면 S: f(x) = 0</text>
  <text class="ts" x="540" y="110" fill="#5f5e5a">zero-level set</text>

  <!-- gradient (normal) 표시 -->
  <line x1="340" y1="100" x2="340" y2="60" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="352" y="80" fill="#3C3489">∇f = n (법선)</text>

  <!-- Eikonal 조건 -->
  <rect x="60" y="345" width="560" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="359" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Eikonal 조건: ‖∇f(x)‖ = 1  (SDF의 필수 성질)</text>
</svg>
