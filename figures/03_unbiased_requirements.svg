<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" role="img">
  <title>NeuS가 요구하는 가중치 함수의 두 가지 성질</title>
  <desc>Unbiased와 occlusion-aware 두 조건을 만족하는 weight function 그림</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .t { font-size: 14px; fill: #2c2c2a; font-weight: 400; }
      .ts { font-size: 12px; fill: #5f5e5a; font-weight: 400; }
      .th { font-size: 14px; fill: #2c2c2a; font-weight: 500; }
    </style>
  </defs>

  <!-- 왼쪽 패널: Unbiased -->
  <rect x="30" y="40" width="300" height="270" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="180" y="68" text-anchor="middle" fill="#0F6E56">1. Unbiased</text>
  <text class="ts" x="180" y="86" text-anchor="middle" fill="#0F6E56">weight peak at f(r(t*))=0</text>

  <line x1="60" y1="240" x2="310" y2="240" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="315" y="244" fill="#444441">t</text>

  <line x1="200" y1="110" x2="200" y2="240" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 3"/>
  <text class="ts" x="200" y="260" text-anchor="middle" fill="#993C1D">t*  (f=0)</text>

  <path d="M60 240 Q 120 240, 160 200 Q 190 120, 200 110 Q 210 120, 240 200 Q 280 240, 310 240"
        fill="none" stroke="#1D9E75" stroke-width="2"/>
  <text class="ts" x="155" y="145" fill="#0F6E56">w(t)</text>

  <circle cx="200" cy="110" r="4" fill="#1D9E75"/>
  <line x1="240" y1="90" x2="210" y2="108" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="244" y="86" fill="#0F6E56">최댓값</text>

  <text class="ts" x="180" y="290" text-anchor="middle" fill="#5f5e5a">표면 위에서 w가 최대</text>


  <!-- 오른쪽 패널: Occlusion-aware -->
  <rect x="350" y="40" width="300" height="270" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="500" y="68" text-anchor="middle" fill="#3C3489">2. Occlusion-aware</text>
  <text class="ts" x="500" y="86" text-anchor="middle" fill="#3C3489">front surface dominates</text>

  <line x1="380" y1="240" x2="630" y2="240" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="635" y="244" fill="#444441">t</text>

  <line x1="460" y1="110" x2="460" y2="240" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="580" y1="160" x2="580" y2="240" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 3"/>
  <text class="ts" x="460" y="260" text-anchor="middle" fill="#993C1D">t₁ (앞)</text>
  <text class="ts" x="580" y="260" text-anchor="middle" fill="#993C1D">t₂ (뒤)</text>

  <path d="M380 240 Q 420 240, 445 180 Q 455 120, 460 110 Q 465 120, 478 180 Q 500 240, 540 240"
        fill="none" stroke="#7F77DD" stroke-width="2"/>
  <path d="M540 240 Q 560 240, 570 200 Q 578 170, 580 165 Q 582 170, 590 200 Q 610 240, 630 240"
        fill="none" stroke="#7F77DD" stroke-width="1.2" opacity="0.6"/>

  <circle cx="460" cy="110" r="4" fill="#534AB7"/>
  <circle cx="580" cy="165" r="3" fill="#534AB7" opacity="0.6"/>

  <text class="ts" x="500" y="290" text-anchor="middle" fill="#5f5e5a">앞 표면이 뒤를 가림</text>
</svg>
