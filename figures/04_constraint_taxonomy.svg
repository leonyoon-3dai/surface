<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430" role="img">
  <title>Surface constraint의 분류 체계</title>
  <desc>Neural surface reconstruction에서 쓰이는 네 가지 주요 제약</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .t { font-size: 14px; fill: #2c2c2a; font-weight: 400; }
      .ts { font-size: 12px; fill: #5f5e5a; font-weight: 400; }
      .th { font-size: 14px; fill: #2c2c2a; font-weight: 500; }
    </style>
  </defs>

  <!-- 중앙 SDF 박스 -->
  <rect x="250" y="30" width="180" height="58" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="340" y="53" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">신경망 SDF f_θ(x)</text>
  <text class="ts" x="340" y="73" text-anchor="middle" dominant-baseline="central" fill="#444441">표면 = zero-level set</text>

  <!-- 좌상: Eikonal -->
  <rect x="30" y="140" width="290" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="175" y="163" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Eikonal 제약</text>
  <text class="ts" x="175" y="184" text-anchor="middle" dominant-baseline="central" fill="#3C3489">‖∇f‖ = 1 (SDF 성질)</text>
  <text class="ts" x="175" y="203" text-anchor="middle" dominant-baseline="central" fill="#3C3489">trivial solution 방지</text>

  <!-- 우상: Unbiased rendering -->
  <rect x="360" y="140" width="290" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="505" y="163" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Unbiased rendering</text>
  <text class="ts" x="505" y="184" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">SDF → density 변환</text>
  <text class="ts" x="505" y="203" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">weight 최대 = 표면 위치</text>

  <!-- 좌하: Surface-zero -->
  <rect x="30" y="260" width="290" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="175" y="283" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Manifold 제약</text>
  <text class="ts" x="175" y="304" text-anchor="middle" dominant-baseline="central" fill="#993C1D">표면 위에서 f(x) = 0</text>
  <text class="ts" x="175" y="323" text-anchor="middle" dominant-baseline="central" fill="#993C1D">normal alignment 옵션</text>

  <!-- 우하: Photometric -->
  <rect x="360" y="260" width="290" height="80" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text class="th" x="505" y="283" text-anchor="middle" dominant-baseline="central" fill="#993556">Photometric 제약</text>
  <text class="ts" x="505" y="304" text-anchor="middle" dominant-baseline="central" fill="#993556">렌더링 색 ≈ 입력 이미지</text>
  <text class="ts" x="505" y="323" text-anchor="middle" dominant-baseline="central" fill="#993556">multi-view 일관성</text>

  <!-- 연결선 -->
  <line x1="280" y1="88" x2="180" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="88" x2="500" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="88" x2="180" y2="260" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="88" x2="500" y2="260" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 전체 손실 -->
  <rect x="80" y="370" width="520" height="42" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="340" y="391" text-anchor="middle" dominant-baseline="central" fill="#633806">L = L_rgb + λ_eik · L_eik + λ_mask · L_mask + λ_smooth · L_smooth</text>
</svg>
